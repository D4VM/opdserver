{% extends "base.html" %}
{% block title %}Tags — OPD Server{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="bi bi-tags-fill"></i>Tags</h1>
</div>

<div class="row">
  <div class="col-md-6 col-lg-5">
    <div class="input-group input-group-sm mb-3">
      <input type="text" class="form-control" id="new-tag" placeholder="New tag name…">
      <button class="btn btn-primary" onclick="createTag()">
        <i class="bi bi-plus-lg me-1"></i>Create
      </button>
    </div>

    {% if tags %}
    <div class="card">
      <ul class="list-group list-group-flush" id="tag-list">
      {% for t in tags %}
      <li class="list-group-item d-flex align-items-center gap-2 px-3" id="tag-{{ t.id }}"
        style="border-color:var(--border-light)">
        <span class="flex-grow-1 tag-name-display small fw-semibold">{{ t.name }}</span>
        <input type="text" class="form-control form-control-sm flex-grow-1 d-none tag-name-input"
          value="{{ t.name }}">
        <a href="/books?tag={{ t.name }}" class="btn btn-xs btn-outline-secondary" title="View books">
          <i class="bi bi-collection"></i>
        </a>
        <button class="btn btn-xs btn-outline-secondary edit-btn" onclick="startEdit({{ t.id }})">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-xs btn-success save-btn d-none" onclick="saveTag({{ t.id }})">
          <i class="bi bi-check2"></i>
        </button>
        <button class="btn btn-xs btn-outline-danger" onclick="deleteTag({{ t.id }})">
          <i class="bi bi-trash"></i>
        </button>
      </li>
      {% endfor %}
      </ul>
    </div>
    {% else %}
    <div class="empty-state" style="padding:2.5rem 1rem">
      <i class="bi bi-tags"></i>
      <p>No tags yet.</p>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function createTag() {
  const input = document.getElementById('new-tag');
  const name = input.value.trim();
  if (!name) return;
  const resp = await fetch(`/api/tags?name=${encodeURIComponent(name)}`, { method: 'POST' });
  const tag = await resp.json();
  input.value = '';

  let list = document.getElementById('tag-list');
  if (!list) {
    // First tag — rebuild the container
    const col = document.querySelector('.col-md-6');
    col.insertAdjacentHTML('beforeend', '<div class="card"><ul class="list-group list-group-flush" id="tag-list"></ul></div>');
    col.querySelector('.empty-state')?.remove();
    list = document.getElementById('tag-list');
  }

  const li = document.createElement('li');
  li.className = 'list-group-item d-flex align-items-center gap-2 px-3';
  li.id = `tag-${tag.id}`;
  li.style.borderColor = 'var(--border-light)';
  li.innerHTML = `
    <span class="flex-grow-1 tag-name-display small fw-semibold">${tag.name}</span>
    <input type="text" class="form-control form-control-sm flex-grow-1 d-none tag-name-input" value="${tag.name}">
    <a href="/books?tag=${encodeURIComponent(tag.name)}" class="btn btn-xs btn-outline-secondary" title="View books"><i class="bi bi-collection"></i></a>
    <button class="btn btn-xs btn-outline-secondary edit-btn" onclick="startEdit(${tag.id})"><i class="bi bi-pencil"></i></button>
    <button class="btn btn-xs btn-success save-btn d-none" onclick="saveTag(${tag.id})"><i class="bi bi-check2"></i></button>
    <button class="btn btn-xs btn-outline-danger" onclick="deleteTag(${tag.id})"><i class="bi bi-trash"></i></button>`;
  list.appendChild(li);
}

function startEdit(tagId) {
  const li = document.getElementById(`tag-${tagId}`);
  li.querySelector('.tag-name-display').classList.add('d-none');
  li.querySelector('.tag-name-input').classList.remove('d-none');
  li.querySelector('.edit-btn').classList.add('d-none');
  li.querySelector('.save-btn').classList.remove('d-none');
  li.querySelector('.tag-name-input').focus();
}

async function saveTag(tagId) {
  const li = document.getElementById(`tag-${tagId}`);
  const name = li.querySelector('.tag-name-input').value.trim();
  if (!name) return;
  await fetch(`/api/tags/${tagId}/rename?name=${encodeURIComponent(name)}`, { method: 'POST' });
  li.querySelector('.tag-name-display').textContent = name;
  li.querySelector('.tag-name-display').classList.remove('d-none');
  li.querySelector('.tag-name-input').classList.add('d-none');
  li.querySelector('.edit-btn').classList.remove('d-none');
  li.querySelector('.save-btn').classList.add('d-none');
}

async function deleteTag(tagId) {
  if (!confirm('Delete this tag? It will be removed from all books.')) return;
  await fetch(`/api/tags/${tagId}`, { method: 'DELETE' });
  const li = document.getElementById(`tag-${tagId}`);
  li?.remove();
  if (!document.querySelector('#tag-list li')) {
    document.querySelector('.card')?.remove();
  }
}
</script>
{% endblock %}
