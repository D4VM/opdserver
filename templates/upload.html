{% extends "base.html" %}
{% block title %}Upload — OPD Server{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3">
  <a href="/books" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-left"></i></a>
  <h5 class="mb-0"><i class="bi bi-cloud-upload me-2"></i>Upload Books</h5>
</div>

<div class="row justify-content-center">
  <div class="col-md-8">
    <div id="drop-zone" class="border border-2 border-dashed rounded p-5 text-center mb-4">
      <i class="bi bi-cloud-upload display-4 text-muted"></i>
      <p class="mt-2 mb-1 fs-5">Drag &amp; drop ebook files here</p>
      <p class="text-muted small mb-3">Supported: EPUB, PDF, MOBI, AZW, CBZ, FB2</p>
      <label class="btn btn-primary">
        <i class="bi bi-folder2-open me-1"></i>Browse Files
        <input type="file" id="file-input" multiple accept=".epub,.pdf,.mobi,.azw,.azw3,.cbz,.fb2,.txt" class="d-none">
      </label>
    </div>

    <div id="upload-queue"></div>
    <div id="upload-results"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const queue = document.getElementById('upload-queue');
const results = document.getElementById('upload-results');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-primary'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-primary'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('border-primary');
  uploadFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

async function uploadFiles(files) {
  if (!files.length) return;
  const fd = new FormData();
  for (const f of files) fd.append('files', f);

  // Show progress
  const progressId = 'prog-' + Date.now();
  queue.innerHTML = `
    <div id="${progressId}" class="mb-3">
      <div class="d-flex justify-content-between small mb-1">
        <span>Uploading ${files.length} file${files.length > 1 ? 's' : ''}…</span>
      </div>
      <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%"></div>
      </div>
    </div>`;

  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await resp.json();
    document.getElementById(progressId)?.remove();

    const html = data.map(r => {
      if (r.error) return `
        <div class="alert alert-warning d-flex align-items-center gap-2 py-2">
          <i class="bi bi-exclamation-triangle"></i>
          <div><strong>${r.filename}</strong> — ${r.error}</div>
        </div>`;
      return `
        <div class="card mb-2">
          <div class="card-body p-3 d-flex align-items-center gap-3">
            ${r.cover ? `<img src="${r.cover}" style="width:45px;height:60px;object-fit:cover;border-radius:4px">` : '<div style="width:45px;height:60px;background:#eee;border-radius:4px"></div>'}
            <div class="flex-grow-1">
              <div class="fw-semibold">${r.title}</div>
              <div class="text-muted small">${r.author || 'Unknown author'} · <span class="text-uppercase">${r.format}</span></div>
            </div>
            <a href="/books/${r.id}/edit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i> Edit</a>
          </div>
        </div>`;
    }).join('');
    results.innerHTML = html + `<div class="text-center mt-2"><a href="/books" class="btn btn-success"><i class="bi bi-collection me-1"></i>View Library</a></div>`;
  } catch {
    document.getElementById(progressId)?.remove();
    results.innerHTML = '<div class="alert alert-danger">Upload failed. Please try again.</div>';
  }
  fileInput.value = '';
}
</script>
{% endblock %}
