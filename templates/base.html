<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OPD Server{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/books"><i class="bi bi-book-half me-2"></i>OPD Server</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/books"><i class="bi bi-collection me-1"></i>Library</a></li>
        <li class="nav-item"><a class="nav-link" href="/upload"><i class="bi bi-cloud-upload me-1"></i>Upload</a></li>
        <li class="nav-item"><a class="nav-link" href="/tags"><i class="bi bi-tags me-1"></i>Tags</a></li>
        <li class="nav-item"><a class="nav-link" href="/authors"><i class="bi bi-people me-1"></i>Authors</a></li>
        <li class="nav-item"><a class="nav-link" href="/series"><i class="bi bi-journals me-1"></i>Series</a></li>
        <li class="nav-item"><a class="nav-link" href="/opds" target="_blank"><i class="bi bi-rss me-1"></i>OPDS</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
