<!DOCTYPE html>
<html lang="{{ current_lang() }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ SERVER_TITLE }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <a class="sidebar-brand" href="/books">
      <i class="bi bi-book-half"></i>
      <span>{{ SERVER_TITLE }}</span>
    </a>
    <nav class="sidebar-nav">
      {% set path = request.url.path %}
      <a href="/books" class="sidebar-link{% if path.startswith('/books') %} active{% endif %}">
        <i class="bi bi-collection-fill"></i><span>{{ ui.nav_library }}</span>
      </a>
      <a href="/upload" class="sidebar-link{% if path == '/upload' %} active{% endif %}">
        <i class="bi bi-cloud-upload-fill"></i><span>{{ ui.nav_upload }}</span>
      </a>
      <a href="/tags" class="sidebar-link{% if path.startswith('/tags') %} active{% endif %}">
        <i class="bi bi-tags-fill"></i><span>{{ ui.nav_tags }}</span>
      </a>
      <a href="/authors" class="sidebar-link{% if path.startswith('/authors') %} active{% endif %}">
        <i class="bi bi-people-fill"></i><span>{{ ui.nav_authors }}</span>
      </a>
      <a href="/series" class="sidebar-link{% if path.startswith('/series') %} active{% endif %}">
        <i class="bi bi-journals"></i><span>{{ ui.nav_series }}</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/settings" class="sidebar-link{% if path == '/settings' %} active{% endif %}">
        <i class="bi bi-gear-fill"></i><span>{{ ui.nav_settings }}</span>
      </a>
      <a href="/opds" target="_blank" class="sidebar-link sidebar-link-sm">
        <i class="bi bi-rss-fill"></i>
        <span>{{ ui.nav_opds_feed }}</span>
        <i class="bi bi-box-arrow-up-right sidebar-external"></i>
      </a>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>
<script>window.UI = {{ ui | tojson }};</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
